version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=your-secret-key-change-in-production
      - PORT=3000
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - db

  db:
    image: sqlite3:latest
    volumes:
      - ./dev.db:/data/dev.db
    command: ["sqlite3", "/data/dev.db", ".read /dev/null"]

volumes:
  postgres_data:
